<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Page 3</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="navbar">
      <button type="button">Home</button>
      <button type="button">About</button>
      <button type="button">Services</button>
    </div>

    <div class="cards">
      <div class="card">
        <h2>Card 1</h2>
        <p>Content card using float layout</p>
        <button class="tag" type="button">Featured</button>
      </div>

      <div class="card">
        <h2>Card 2</h2>
        <p>Content card using float layout</p>
        <button class="tag" type="button">New</button>
      </div>

      <div class="card">
        <h2>Card 3</h2>
        <p>Content card using float layout</p>
        <button class="tag" type="button">Popular</button>
      </div>
    </div>

    <div class="promo">
      <div class="promo-text">
        <h3>Special Promotion!</h3>
        <p>Get 20% off today only</p>
      </div>
      <button class="close-btn" type="button">X</button>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll("button");

    buttons.forEach(function (button) {
      button.addEventListener("click", function () {
        button.blur();
      });
    });
  </script>
</body>
</html>
